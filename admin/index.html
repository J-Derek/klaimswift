<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlaimSwift — Admin Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* Same styles as mock version */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #111B21;
            --surface: #202C33;
            --surface2: #2A3942;
            --accent: #25D366;
            --accent-dim: #1A9B4B;
            --text: #E9EDEF;
            --text2: #8696A0;
            --danger: #EF4444;
            --warning: #F59E0B;
            --border: #3B4A54;
            --radius: 12px
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh
        }

        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border)
        }

        .sidebar-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            color: var(--accent)
        }

        .sidebar-header p {
            font-size: 12px;
            color: var(--text2);
            margin-top: 2px
        }

        .nav {
            flex: 1;
            padding: 12px 0;
            overflow-y: auto
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text2);
            cursor: pointer;
            font-size: 14px;
            transition: .15s;
            border-left: 3px solid transparent
        }

        .nav-item:hover {
            background: var(--surface2);
            color: var(--text)
        }

        .nav-item.active {
            background: rgba(37, 211, 102, .08);
            color: var(--accent);
            border-left-color: var(--accent)
        }

        .nav-item .material-icons-round {
            font-size: 20px
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text2)
        }

        .btn-logout {
            background: none;
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            width: 100%;
            margin-top: 8px;
            transition: .15s
        }

        .btn-logout:hover {
            border-color: var(--danger);
            color: var(--danger)
        }

        .main {
            margin-left: 260px;
            flex: 1;
            padding: 24px 32px;
            min-height: 100vh
        }

        .page {
            display: none
        }

        .page.active {
            display: block
        }

        .page-header {
            margin-bottom: 24px
        }

        .page-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px
        }

        .kpi-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border)
        }

        .kpi-card .label {
            font-size: 12px;
            color: var(--text2);
            text-transform: uppercase
        }

        .kpi-card .value {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-top: 4px;
            color: var(--accent)
        }

        .table-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 24px
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            color: var(--text2);
            border-bottom: 1px solid var(--border)
        }

        td {
            padding: 12px 16px;
            font-size: 13px;
            border-bottom: 1px solid rgba(59, 74, 84, .3)
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600
        }

        .badge.green {
            background: rgba(37, 211, 102, .15);
            color: #25D366
        }

        .badge.red {
            background: rgba(239, 68, 68, .15);
            color: #EF4444
        }

        .badge.yellow {
            background: rgba(245, 158, 11, .15);
            color: #F59E0B
        }

        .badge.blue {
            background: rgba(59, 130, 246, .15);
            color: #3B82F6
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: .15s
        }

        .btn-primary {
            background: var(--accent);
            color: #111B21
        }

        .btn-danger {
            background: var(--danger);
            color: #fff
        }

        .btn-outline {
            background: none;
            border: 1px solid var(--border);
            color: var(--text2)
        }

        .drawer {
            position: fixed;
            right: -500px;
            top: 0;
            bottom: 0;
            width: 480px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 200;
            transition: .3s;
            padding: 24px
        }

        .drawer.open {
            right: 0
        }

        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            z-index: 199;
            display: none
        }

        .drawer-overlay.open {
            display: block
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1>⚡ KlaimSwift</h1>
            <p>Admin Panel</p>
        </div>
        <div class="nav">
            <div class="nav-item active" data-page="claims"><span
                    class="material-icons-round">description</span><span>Claims Inbox</span></div>
            <div class="nav-item" data-page="payouts"><span
                    class="material-icons-round">payments</span><span>Payouts</span></div>
        </div>
        <div class="sidebar-footer">
            <span id="adminEmail">Loading...</span>
            <button class="btn-logout" onclick="logout()">Sign Out</button>
        </div>
    </nav>

    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="claimDrawer">
        <div id="drawerContent"></div>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="page active" id="page-claims">
            <div class="page-header">
                <h2>Claims Inbox</h2>
            </div>
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>Claim ID</th>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>AI Score</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="claimsTableBody"></tbody>
                </table>
            </div>
        </div>
        <div class="page" id="page-payouts">
            <div class="page-header">
                <h2>M-Pesa Payouts</h2>
            </div>
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>Claim ID</th>
                            <th>Amount</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>TX ID</th>
                        </tr>
                    </thead>
                    <tbody id="payoutsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Supabase Config must be filled here!
        const _supabaseUrl = 'YOUR_SUPABASE_URL';
        const _supabaseAnonKey = 'YOUR_SUPABASE_ANON_KEY';

        const supabase = supabase.createClient(_supabaseUrl, _supabaseAnonKey);
        let sessionToken = null;

        // Check Auth
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return window.location.href = 'login.html';
            sessionToken = session.access_token;
            document.getElementById('adminEmail').textContent = session.user.email;
            fetchData();
            setupRealtime();
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        }

        checkAuth();

        // Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                item.classList.add('active');
                document.getElementById('page-' + item.dataset.page).classList.add('active');
            });
        });

        function statusBadge(s) { return { pending: 'yellow', ai_review: 'blue', adjuster_review: 'yellow', approved: 'green', paid: 'green', rejected: 'red', payout_initiated: 'blue', completed: 'green' }[s] || 'gray' }

        async function fetchData() {
            // Fetch Claims
            const { data: claims } = await supabase.from('claims').select('*').order('filed_at', { ascending: false });
            if (claims) {
                document.getElementById('claimsTableBody').innerHTML = claims.map(c =>
                    `<tr>
                    <td>${c.claim_id}</td>
                    <td>${c.type}</td>
                    <td>KES ${(c.amount_kes || 0).toLocaleString()}</td>
                    <td><span class="badge ${statusBadge(c.status)}">${c.status}</span></td>
                    <td>${c.ai_score || '-'}</td>
                    <td>
                        <button class="btn btn-primary" onclick="approveClaim('${c.claim_id}')" ${c.status !== 'pending' && c.status !== 'adjuster_review' ? 'disabled' : ''}>Approve</button>
                    </td>
                </tr>`
                ).join('');
            }

            // Fetch Payouts
            const { data: payouts } = await supabase.from('mpesa_transactions').select('*').order('initiated_at', { ascending: false });
            if (payouts) {
                document.getElementById('payoutsTableBody').innerHTML = payouts.map(t =>
                    `<tr>
                    <td>${t.claim_id}</td>
                    <td>KES ${(t.amount || 0).toLocaleString()}</td>
                    <td>${t.phone}</td>
                    <td><span class="badge ${statusBadge(t.status)}">${t.status}</span></td>
                    <td>${t.transaction_id || '-'}</td>
                </tr>`
                ).join('');
            }
        }

        function setupRealtime() {
            supabase.channel('public:claims').on('postgres_changes', { event: '*', schema: 'public', table: 'claims' }, fetchData).subscribe();
            supabase.channel('public:mpesa_transactions').on('postgres_changes', { event: '*', schema: 'public', table: 'mpesa_transactions' }, fetchData).subscribe();
        }

        async function approveClaim(claimId) {
            if (!confirm(`Approve claim ${claimId} and send M-Pesa payout?`)) return;

            try {
                const res = await fetch('/api/admin/approve-claim', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
                    body: JSON.stringify({ claimId })
                });
                const data = await res.json();
                if (data.error) alert('Error: ' + data.error);
            } catch (err) {
                alert('Failed to approve claim');
            }
        }

        function closeDrawer() {
            document.getElementById('claimDrawer').classList.remove('open');
            document.getElementById('drawerOverlay').classList.remove('open');
        }
    </script>
</body>

</html>
