<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KlaimSwift — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #111B21;
      color: #E9EDEF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-card {
      background: #202C33;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      color: #25D366;
    }
    .logo p {
      color: #8696A0;
      font-size: 14px;
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #8696A0;
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: #2A3942;
      border: 1px solid #3B4A54;
      border-radius: 8px;
      color: #E9EDEF;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #25D366;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #25D366;
      color: #111B21;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-login:hover { background: #1EBE5A; }
    .btn-login:disabled { background: #3B4A54; cursor: not-allowed; }
    .error-msg {
      color: #EF4444;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      color: #8696A0;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>⚡ KlaimSwift</h1>
      <p>Admin Dashboard</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@klaimswift.co.ke" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      <p class="error-msg" id="errorMsg"></p>
    </form>
    <div class="footer">KlaimSwift — Kenya Insurance Claims Platform</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script>
    // Firebase config — replace with your project config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_BUCKET.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);

    // Check if already logged in
    firebase.auth().onAuthStateChanged(user => {
      if (user) window.location.href = 'index.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errEl.style.display = 'none';

      try {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        await firebase.auth().signInWithEmailAndPassword(email, password);
        window.location.href = 'index.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
