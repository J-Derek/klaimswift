<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KlaimSwift — Admin Login</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #111B21;
      color: #E9EDEF;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #202C33;
      width: 100%;
      max-width: 400px;
      padding: 40px;
      border-radius: 16px;
      border: 1px solid #3B4A54;
      text-align: center;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      color: #25D366;
      font-size: 28px;
      margin-bottom: 8px;
    }

    p {
      color: #8696A0;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 16px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 12px;
      color: #8696A0;
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      background: #2A3942;
      border: 1px solid #3B4A54;
      color: #E9EDEF;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
    }

    input:focus {
      border-color: #25D366;
    }

    .btn {
      width: 100%;
      background: #25D366;
      color: #111B21;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
    }

    .btn:hover {
      background: #1EBE5A;
    }

    .error {
      color: #EF4444;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <h1>⚡ KlaimSwift</h1>
    <p>Admin Portal</p>

    <form id="loginForm">
      <div class="input-group">
        <label>EMAIL ADDRESS</label>
        <input type="email" id="email" required placeholder="admin@klaimswift.co.ke">
      </div>
      <div class="input-group">
        <label>PASSWORD</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn" id="loginBtn">Sign In</button>
      <div id="errorMsg" class="error"></div>
    </form>
  </div>

  <script>
    // Supabase Config must be filled here!
    const _supabaseUrl = 'YOUR_SUPABASE_URL';
    const _supabaseAnonKey = 'YOUR_SUPABASE_ANON_KEY';

    const supabase = supabase.createClient(_supabaseUrl, _supabaseAnonKey);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');

      btn.textContent = 'Authenticating...';
      errorMsg.style.display = 'none';

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
        btn.textContent = 'Sign In';
      } else {
        btn.textContent = 'Success!';
        btn.style.background = '#3B82F6';
        window.location.href = 'index.html';
      }
    });

    // Check if already logged in
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html';
    });
  </script>

</body>

</html>
